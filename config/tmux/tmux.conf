# ==============================================================================
# tmux 設定ファイル
# ターミナルマルチプレクサ tmux のミニマルな設定
# ==============================================================================

# ------------------------------------------------------------------------------
# プレフィックスキーの変更
# デフォルトの Ctrl-b は押しにくいため Ctrl-t に変更する
# tmux のすべての操作は、まずプレフィックスキーを押してから行う
# ------------------------------------------------------------------------------
unbind C-b                      # デフォルトのプレフィックスキー Ctrl-b を無効にする
set-option -g prefix C-t        # 新しいプレフィックスキーを Ctrl-t に設定する
bind-key C-t send-prefix        # Ctrl-t を2回押すと、アプリケーションに Ctrl-t を送信する

# ------------------------------------------------------------------------------
# ペイン分割のキーバインド
# デフォルトの " と % は覚えにくいため、直感的な | と - に変更する
# | で縦に分割（左右）、- で横に分割（上下）
# ------------------------------------------------------------------------------
bind | split-window -h          # プレフィックス + | でペインを左右に分割する
bind - split-window -v          # プレフィックス + - でペインを上下に分割する
unbind '"'                      # デフォルトの上下分割キー " を無効にする
unbind %                        # デフォルトの左右分割キー % を無効にする

# ------------------------------------------------------------------------------
# 設定ファイルの再読み込み
# tmux を再起動せずに設定変更を反映できる便利なキーバインド
# ------------------------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ------------------------------------------------------------------------------
# ペイン間の移動
# Alt + vim風キーで隣のペインに素早く移動できる
# -n オプションによりプレフィックスキーなしで直接操作できる
# ------------------------------------------------------------------------------
bind -n M-h select-pane -L      # Alt + h で左のペインに移動する
bind -n M-l select-pane -R      # Alt + l で右のペインに移動する
bind -n M-k select-pane -U      # Alt + k で上のペインに移動する
bind -n M-j select-pane -D      # Alt + j で下のペインに移動する

# ------------------------------------------------------------------------------
# マウスモードの有効化
# マウスでペインの選択、リサイズ、スクロールができるようになる
# ターミナルが対応していれば、クリックでペインを切り替えられる
# ------------------------------------------------------------------------------
set -g mouse on

# ------------------------------------------------------------------------------
# ウィンドウの設定
# ウィンドウの自動リネームを無効にし、番号を1から開始する
# ------------------------------------------------------------------------------
set-option -g allow-rename off  # 実行中のコマンド名でウィンドウ名が勝手に変わるのを防ぐ
set -g base-index 1             # ウィンドウ番号を0ではなく1から開始する（キーボードの配置に合わせる）
setw -g pane-base-index 1       # ペイン番号も1から開始する
set -g renumber-windows on      # ウィンドウを閉じたとき番号を詰めて振り直す（歯抜けを防ぐ）

# ------------------------------------------------------------------------------
# スクロールバックバッファの設定
# 過去のコマンド出力をどれだけ遡れるかを制御する
# デフォルトの2000行では足りないことが多いため増やす
# ------------------------------------------------------------------------------
set -g history-limit 10000

# ------------------------------------------------------------------------------
# 色の設定
# 256色とTrue Color(24bit色)に対応させる
# これにより vim などのアプリケーションで正確な色が表示される
# ------------------------------------------------------------------------------
set -g default-terminal "screen-256color"          # 256色対応ターミナルとして動作する
set -ga terminal-overrides ",*256col*:Tc"          # True Color (24bit) を有効にする

# ------------------------------------------------------------------------------
# ステータスバーの設定
# 画面下部に表示される情報バーの見た目と内容を設定する
# 左側にセッション名、右側にユーザー名・ホスト名・日時を表示する
# ------------------------------------------------------------------------------
set -g status-style bg=black,fg=white              # 背景を黒、文字を白にする
set -g status-left '#[fg=green][#S] '              # 左側にセッション名を緑色で表示する
set -g status-right '#[fg=yellow]#(whoami)@#H #[fg=white]%Y-%m-%d %H:%M'  # 右側にユーザー情報と日時を表示する
set -g status-left-length 40                       # 左側の最大表示幅（文字数）
set -g status-right-length 60                      # 右側の最大表示幅（文字数）

# ------------------------------------------------------------------------------
# ウィンドウ一覧の表示スタイル
# ステータスバー中央に表示されるウィンドウ一覧の見た目を設定する
# ------------------------------------------------------------------------------
setw -g window-status-current-style fg=black,bg=green  # 現在のウィンドウは黒文字に緑背景で目立たせる
setw -g window-status-style fg=white,bg=black          # その他のウィンドウは白文字に黒背景

# ------------------------------------------------------------------------------
# ペイン境界線の設定
# ペイン間の区切り線の色を設定する
# アクティブなペインの境界線を緑にして、どのペインが選択中か分かりやすくする
# ------------------------------------------------------------------------------
set -g pane-border-style fg=colour235               # 非アクティブなペインの境界線（暗いグレー）
set -g pane-active-border-style fg=green            # アクティブなペインの境界線（緑色で目立たせる）

# ------------------------------------------------------------------------------
# メッセージの表示スタイル
# tmux のコマンドラインメッセージの見た目を設定する
# ------------------------------------------------------------------------------
set -g message-style bg=black,fg=yellow             # メッセージは黒背景に黄色文字で表示する

# ------------------------------------------------------------------------------
# vi モードの設定
# コピーモードでの操作を vim 風のキーバインドにする
# v で選択開始、y でコピー（vim と同じ操作感）
# ------------------------------------------------------------------------------
setw -g mode-keys vi                                           # コピーモードで vi キーバインドを使う
bind-key -T copy-mode-vi v send-keys -X begin-selection        # v キーで範囲選択を開始する
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel  # y キーで選択範囲をコピーしてコピーモードを終了する

# ------------------------------------------------------------------------------
# エスケープキーの遅延設定
# デフォルトでは ESC キーに遅延があり、vim での操作がもたつく
# 0 に設定することで ESC キーが即座に反応するようになる
# ------------------------------------------------------------------------------
set -sg escape-time 0

# ------------------------------------------------------------------------------
# フォーカスイベントの設定
# tmux 内のアプリケーション（vim など）にフォーカスの変更を通知する
# vim の autoread などの機能が正しく動作するために必要
# ------------------------------------------------------------------------------
set -g focus-events on
